name: Build Electron App

# Packages the Electron shell (electron/main.cjs) for Windows and macOS.
# Runs on each platform's own GitHub-hosted runner rather than
# cross-compiling — electron-builder's Windows target needs a
# symlink-creation privilege for its code-signing-adjacent tooling that a
# locked-down dev machine may not have (Developer Mode / admin), and its
# macOS target (dmg via hdiutil, proper .app bundling) isn't meaningfully
# buildable from a non-Mac at all. Hosted runners have neither restriction.
#
# Two ways this runs:
#  - push to the branch / manual dispatch: build + upload as a plain
#    Actions artifact, for quick "does it still build" checks. Downloadable
#    from the run page, but not a versioned release.
#  - pushing a "v*" tag: builds AND publishes straight to a real (non-draft)
#    GitHub Release via electron-builder's own --publish always (see
#    "release:win"/"release:mac" in package.json — build.publish there points
#    at this repo with releaseType "release"). This is also what makes
#    auto-update work: --publish is what generates and uploads latest.yml /
#    latest-mac.yml / *.blockmap alongside the installers, which is the feed
#    electron-updater (electron/main.cjs) polls on already-installed clients.
#    No human approval step — a tag push goes live to users automatically,
#    by design (see feature/product-frontend-ui history).
on:
  workflow_dispatch:
  push:
    branches:
      - feature/product-frontend-ui
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish (macOS)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned build: no Apple Developer certificate in this repo.
          # Without this, electron-builder tries (and fails) to find one.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build only (Windows)
        if: runner.os == 'Windows' && !startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:win

      - name: Build only (macOS)
        if: runner.os == 'macOS' && !startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: posturefairy-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            release/*.exe
            release/*.dmg
