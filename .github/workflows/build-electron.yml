name: Build Electron App

# Packages the Electron shell (electron/main.cjs) for Windows and macOS.
# Runs on each platform's own GitHub-hosted runner rather than
# cross-compiling — electron-builder's Windows target needs a
# symlink-creation privilege for its code-signing-adjacent tooling that a
# locked-down dev machine may not have (Developer Mode / admin), and its
# macOS target (dmg via hdiutil, proper .app bundling) isn't meaningfully
# buildable from a non-Mac at all. Hosted runners have neither restriction.
#
# Two ways this runs:
#  - push to the branch / manual dispatch: build + upload as a plain
#    Actions artifact, for quick "does it still build" checks. Downloadable
#    from the run page, but not a versioned release.
#  - pushing a "v*" tag: create-release pre-creates a real (non-draft)
#    GitHub Release with a fixed title/body (electron/RELEASE_NOTES.md,
#    version-substituted) BEFORE either platform builds — electron-builder
#    finds that existing release by tag and just attaches its own artifacts
#    to it (confirmed behavior: it reuses an existing non-draft release
#    published under 2h ago rather than erroring or recreating it), so the
#    release always shows the same maintained description instead of a
#    blank/auto-generated one. --publish always is also what generates and
#    uploads latest.yml / *.blockmap alongside the Windows installer — the
#    feed electron-updater (electron/main.cjs) polls on already-installed
#    clients. No human approval step — a tag push goes live to users
#    automatically, by design.
#
#    mac ships dmg-only (see package.json's "mac" target) — no zip/
#    latest-mac.yml, since Squirrel.Mac auto-update needs code signing this
#    repo doesn't have and would just be unusable clutter in the release.
on:
  workflow_dispatch:
  push:
    branches:
      - feature/product-frontend-ui
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render release notes and create/update the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed "s/{{VERSION}}/${VERSION}/g" electron/RELEASE_NOTES.md > /tmp/release-notes.md
          TITLE="v${VERSION} — 바른 자세 코치 요정 (Windows/macOS)"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${TITLE}" --notes-file /tmp/release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${TITLE}" --notes-file /tmp/release-notes.md
          fi

  build:
    needs: create-release
    # Runs even when create-release was skipped (plain branch push/dispatch,
    # not a tag) — its own steps below are what actually gate on the ref.
    if: always()
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish (macOS)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned build: no Apple Developer certificate in this repo.
          # Without this, electron-builder tries (and fails) to find one.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build only (Windows)
        if: runner.os == 'Windows' && !startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:win

      - name: Build only (macOS)
        if: runner.os == 'macOS' && !startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: posturefairy-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            release/*.exe
            release/*.dmg
